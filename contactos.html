<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioNexus - Contactos</title>
    <link rel="stylesheet" href="Css/estilos.css">
</head>
<body>
    <header>
        <h1>BioNexus</h1>
        <p>Tu bienestar, nuestra tecnología.</p>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="about.html">Acerca de</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="contactos.html">Contactos</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contáctanos</h2>
        <div class="contenedor-contacto">
            <div class="formulario">
                <form id="contactForm">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required >

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" required>

                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="comentario">Comentario:</label>
                    <textarea id="comentario" name="comentario" rows="4" required></textarea>

                    <button type="submit">Enviar consulta</button>
                </form>
            </div>
            <div class="nota-guardada">
                <h3>Nota de contacto guardada</h3>
                <div id="resultado">
                    <p>Aquí aparecerán los datos del formulario después de enviarlo.</p>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 - Jesus Rojas | Email: jr6956109@gmail.com | Tel: +58 0424 145 0329</p>
        <p><button id="btnSubir">Volver arriba</button></p>
    </footer>
    <script src="js/contactos.js" defer></script>
    <script src="Js/globales.js" defer></script>
</body>
</html>
